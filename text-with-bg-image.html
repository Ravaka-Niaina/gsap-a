<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text with bg image</title>
    <style>
      .wrapper {
        text-align: center;
      }

      .clip-text {
        font-size: 6em;
        font-weight: bold;
        line-height: 1;
        position: relative;
        display: inline-block;
        margin: 0.25em;
        padding: 0.5em 0.75em;
        text-align: center;
        /* Color fallback */
        color: #fff;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .clip-text:before,
      .clip-text:after {
        position: absolute;
        content: "";
      }

      /* Background */
      .clip-text:before {
        z-index: -2;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        background-image: inherit;
      }

      /* Text Background (black zone) */
      .clip-text:after {
        position: absolute;
        z-index: -1;
        top: 0.125em;
        right: 0.125em;
        bottom: 0.125em;
        left: 0.1255em;
        background-color: #000;
      }

      .clip-text_one {
        background-image: url(https://picsum.photos/480/200?random);
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="clip-text clip-text_one">JINTOS</div>
    </div>
  </body>
</html>
